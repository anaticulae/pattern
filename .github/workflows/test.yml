---
name: Tests
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: build docker container
        run: make docker-build
  doctest:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: run doctest
        run: make docker-doctest
  fasttest:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v7
        with:
        # required by test which requires commits
          fetch-depth: 15
      - name: run fasttest
        run: make docker-fasttest
  linter:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: run linter
        run: make docker-lint
